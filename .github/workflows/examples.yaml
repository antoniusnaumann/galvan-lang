name: Examples

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        path: [./example-projects/cli-app, ./example-projects/hello-world, ./example-projects/serde-json]
    steps:
      - uses: actions/checkout@v3
        with: 
          submodules: 'true'
      - name: Check
        run: cargo check --verbose
        working-directory: ${{ matrix.path }}
      - name: Build
        run: cargo build --verbose
        working-directory: ${{ matrix.path }}
      - name: Run serde_json example
        if: matrix.path == './example-projects/serde-json'
        run: cargo run --verbose
        working-directory: ${{ matrix.path }}
